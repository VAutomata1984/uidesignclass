<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Design HW 2 - Tinder</title>

  <!-- 
    Author: Matthew Vollo
    UI Design (COMS 4170) - HW 2 Problem 1: Tinder 

    Restricted to only use: div, span, br and hr 

    Date: 01/09/2026 - 01/09/2026
  -->

  <style>
    #container{
      width: 400px;
      font-family: Helvetica; 
    }

    #header{
      display: flex;
      justify-content: center;  /* horizontal centering */
      align-items: center;
    }

    #tinder_logo{
      width: 175px;
    }

    hr{
      border: none;
      border-top: 1px solid #e5e5e5;
      margin-bottom: 20px;
    }

    #info{
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgb(233, 233, 233);
      box-shadow: 0px 2px rgb(233, 233, 233);
    }

    #info img{
      width:100%;
    }

    #info_text{
      margin: 10px 0px 0px 20px;
    }

    #tinder_name{
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 20px;
    }

    #tinder_check img{
      width: 20px;
    }

    .weak_text{
      color: rgb(156, 154, 154);
      font-size: 16px;
      margin-bottom: 10px;
    }

    #tinder_button{
      margin: 10px auto 0 auto;
      font-size: 20px;
      width: 200px;
      padding: 15px 25px 15px 25px;
      color: white;
      background-color: gray;
      border-radius: 30px;

      display: flex;
      align-items: center;    
    }

    #tinder_button img{
      width: 20px;
      margin-right: 5px;
    }

    #tinder_button:hover{
      cursor: pointer;
    }

  
  </style>

</head>
<body>
  <div id="container"> 
    <div id="header"> 
      <img id="tinder_logo" src="http://coms4170.cs.columbia.edu/2019-spring/assignments/hw2/tinder_images/tinder_logo.png"> 
    </div>
    <hr> 

    <div id="info"> 
      <div> <img src="http://coms4170.cs.columbia.edu/2019-spring/assignments/hw2/tinder_images/tinder_person.png"> </div>
      <div id="info_text"> 
        <div id="tinder_name"> Sean Rad, 29  <span id="tinder_check"> <img src="http://coms4170.cs.columbia.edu/2019-spring/assignments/hw2/tinder_images/tinder_verified.png"> </span> </div>
        <div class="weak_text">  Verified  </div>
      </div>
    </div>

    <div id="tinder_button"> <img src="http://coms4170.cs.columbia.edu/2019-spring/assignments/hw2/tinder_images/heart.png"> <span> Like Me On Tinder </span></div>  

  </div>
</body>
</html>
