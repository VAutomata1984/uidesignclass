<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScareMii Dot Com</title>

   <!-- Bootstrap -->
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JQuery -->
    <script src="http://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="http://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">

    <script type="text/javascript" src="{{url_for('static', filename='search.js')}}"> </script>
</head>

<script> 
  let games = {{games|tojson}}
  console.log(games)
</script>

<body>
  <nav class="navbar navbar-light bg-light fixed-top"> 
    <div class="container-fluid"> 
      <a class="navbar-brand" href="/"> ScareMii </a>
      <!-- "action" determines the backend URL routing -->
      <form id="navbar-search-bar" class="d-flex" method="POST" action="/search"> 
        <input name="search_text" id="search-text" class="form-control me-2" type="search" placeholder="Search" aria-label="Search"> 
        <button class="btn btn-outline-success" type="submit" href="/search"> Search </button> 
      </form>
    </div>
  </nav>

  <div class="container mt-5 pt-5">
    {% block content %}
    {% endblock %}
  </div>
  
</body>
</html>
