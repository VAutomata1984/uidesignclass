{% extends "layout.html" %}

{% block content %}

<h1> Results for "{{ search_text }}" </h1>
<ul>
  {% if results %}
    {% for result in results %}
    <li> <a href="/view/{{ result['id'] }}">{{ result['title'] }}</a> </li>
    {% endfor %}
  {% else %}
  <br>
  <h2> No Results Found. There is nothing left.</h2>
  {% endif %}
</ul>

{% endblock %}
