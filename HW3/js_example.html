<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Example from Lecture #5-6</title>

  <!-- 
    Author: Matthew Vollo
    UI Design (COMS 4170) - Javascript Example from Lecture. 

    There are my attempts to remake the examples shown in lecture. 
  --> 
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

  <script src=https://code.jquery.com/jquery-3.3.1.min.js crossorigin="anonymous"></script>

  <!-- JQuery Code-->
  <script> 

   // Button #1
   // load document first, then add event! 
   $(document).ready(function(){
      $("#counter").click(function(){
        alert("foo")
      })
    })

    // Button #2
    let count = 0

    function incrementCount(c){
      return c + 1;
    }

    $(document).ready(function(){
      $("#counter2").click(function(){
        count = incrementCount(count)
        $("#counter2").html("Count(" +count+ ")")
      })
    })

    // Button #3 - Dynamic Button Creator 
    function createButton(){
      var new_button = $("<button class='btn btn-secondary'>")
      $(new_button).text("dynamic button " +Date.now())
      $("#updates").append(new_button)
      $("#updates").append("<br>")

      var d = Date.now()
      $(new_button).click(function(){ alert(d) })
    }

    $(document).ready(function(){
      $("#counter3").click(function(){
        createButton()
      })
    })


  </script>
  
</head>

<body>
  <button id="counter" class="btn btn-primary mb-2"> Counter (0) </button> 
  <br> 
  <button id="counter2" class="btn btn-primary"> Counter (0) </button> 
  <br><br>
  <button id="counter3" class="btn btn-primary">Static Button (0)</button>
  <br><br>
  <div id="updates"></div>
  

</body>
</html>
