<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Warmup</title>
  <!-- 
    Author: Matthew Vollo
    UI Design (COMS 4170) - HW 3: Javascript Warmup

    Requirements: 
    - You must use JQuery (not plain JavaScript or HTML) to register the click handler after the page has loaded.
    - Use a single HTML file that has all your HTML, and JavaScript code (and CSS if you use any).

    Date: 01/28/2026 - 01/28/2026
  --> 
  <script src=https://code.jquery.com/jquery-3.3.1.min.js crossorigin="anonymous"></script>

  <script> 
    $(document).ready(function(){
      $("#counter").click(function(){
        console.log("I was clicked. " +Math.random())
        alert("And if you complain once more... you will meet an army of me!")
      })
    })
  </script>
</head>
<body>
  <div id="container"> 
    <button id="counter"> Counter </button>
  </div>
</body>
</html>
